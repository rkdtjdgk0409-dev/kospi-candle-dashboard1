name: Update KOSPI dashboard

on:
  schedule:
    # 평일 07:10 UTC = 한국 시간 16:10
    - cron: "10 7 * * 1-5"

  # GitHub Actions 화면에서 직접 실행할 수 있게 함
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: kospi-pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update KOSPI data
        env:
          TZ: Asia/Seoul
          PYTHONUNBUFFERED: "1"
        run: python scripts/update_kospi.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/kospi.db docs/data/kospi.json

          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "chore: update KOSPI data"
            git push
          fi

  deploy:
    needs: update
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout updated repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
