<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KOSPI Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root { color-scheme: light dark; --bg:#fff; --panel:#f7f7f8; --text:#191919; --muted:#777; --border:#e8e8e8; --up:#e5484d; --down:#3b82f6; }
    @media (prefers-color-scheme: dark) { :root { --bg:#191919; --panel:#242424; --text:#f5f5f5; --muted:#aaa; --border:#363636; } }
    * { box-sizing:border-box; }
    body { margin:0; padding:16px; background:var(--bg); color:var(--text); font-family:Inter,Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    main { width:100%; max-width:1200px; margin:auto; }
    .summary { display:flex; align-items:flex-end; gap:20px; padding:18px 20px; background:var(--panel); border:1px solid var(--border); border-radius:14px; }
    .label { margin:0 0 4px; color:var(--muted); font-size:14px; }
    .price { margin:0; font-size:30px; font-weight:700; }
    .change { padding-bottom:4px; font-size:16px; font-weight:600; }
    .meta { margin-left:auto; padding-bottom:4px; color:var(--muted); text-align:right; font-size:12px; }
    .controls { display:flex; flex-wrap:wrap; gap:8px; margin:14px 0; }
    button { padding:7px 12px; border:1px solid var(--border); border-radius:8px; background:var(--panel); color:var(--text); cursor:pointer; }
    button.active { color:#fff; background:#2383e2; border-color:#2383e2; }
    #chart { width:100%; height:560px; border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    #error { display:none; padding:30px; color:#d93025; text-align:center; }
    @media (max-width:600px) { body { padding:8px; } .summary { align-items:flex-start; flex-direction:column; gap:8px; } .meta { margin-left:0; text-align:left; } #chart { height:460px; } }
  </style>
</head>
<body>
  <main>
    <section class="summary">
      <div><p class="label">KOSPI</p><p id="price" class="price">불러오는 중...</p></div>
      <div id="change" class="change"></div>
      <div class="meta"><div id="trade-date"></div><div id="updated-at"></div></div>
    </section>
    <nav class="controls" aria-label="조회 기간">
      <button data-days="30">1개월</button><button data-days="90">3개월</button>
      <button data-days="180">6개월</button><button data-days="365">1년</button>
      <button data-days="1095">3년</button><button data-days="0" class="active">전체</button>
    </nav>
    <div id="chart"></div><div id="error"></div>
  </main>
  <script>
    let allRows=[];
    const number=v=>Number(v).toLocaleString("ko-KR",{minimumFractionDigits:2,maximumFractionDigits:2});
    function selected(days){
      if(!days)return allRows;
      const last=new Date(allRows.at(-1).trade_date), first=new Date(last);
      first.setDate(first.getDate()-days);
      return allRows.filter(row=>new Date(row.trade_date)>=first);
    }
    function draw(days=0){
      const rows=selected(days);
      Plotly.react("chart",[{type:"scatter",mode:"lines",x:rows.map(r=>r.trade_date),y:rows.map(r=>r.close),name:"KOSPI",line:{color:"#2383e2",width:2},fill:"tozeroy",fillcolor:"rgba(35,131,226,.08)",hovertemplate:"%{x}<br>KOSPI %{y:,.2f}<extra></extra>"}],{margin:{l:58,r:20,t:28,b:48},paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",font:{color:getComputedStyle(document.documentElement).getPropertyValue("--text")},xaxis:{rangeslider:{visible:false},gridcolor:"rgba(128,128,128,.15)"},yaxis:{tickformat:",.0f",gridcolor:"rgba(128,128,128,.15)"},hovermode:"x unified",showlegend:false,autosize:true},{responsive:true,displaylogo:false});
    }
    async function load(){
      try{
        const response=await fetch(`./data/kospi.json?t=${Date.now()}`);
        if(!response.ok)throw new Error(`HTTP ${response.status}`);
        const payload=await response.json(); allRows=payload.data;
        if(!allRows?.length)throw new Error("표시할 데이터가 없습니다.");
        const latest=payload.latest, rate=Number(latest.change_rate??0);
        document.querySelector("#price").textContent=number(latest.close);
        const change=document.querySelector("#change");
        change.textContent=`${rate>=0?"+":""}${rate.toFixed(2)}%`;
        change.style.color=rate>=0?"var(--up)":"var(--down)";
        document.querySelector("#trade-date").textContent=`기준일 ${latest.trade_date}`;
        document.querySelector("#updated-at").textContent=`갱신 ${new Date(payload.updated_at).toLocaleString("ko-KR")}`;
        draw();
      }catch(error){
        console.error(error); document.querySelector("#chart").style.display="none";
        const box=document.querySelector("#error"); box.style.display="block"; box.textContent=`차트 데이터를 불러오지 못했습니다: ${error.message}`;
      }
    }
    document.querySelectorAll("button[data-days]").forEach(button=>button.addEventListener("click",()=>{
      document.querySelectorAll("button[data-days]").forEach(item=>item.classList.remove("active"));
      button.classList.add("active"); draw(Number(button.dataset.days));
    }));
    load();
  </script>
</body>
</html>
