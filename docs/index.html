<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KOSPI 캔들 차트</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root{color-scheme:light dark;--bg:#fff;--panel:#f7f7f8;--text:#191919;--muted:#777;--border:#e5e7eb;--up:#e5484d;--down:#3b82f6}
    @media(prefers-color-scheme:dark){:root{--bg:#191919;--panel:#242424;--text:#f5f5f5;--muted:#aaa;--border:#3a3a3a}}
    *{box-sizing:border-box}body{margin:0;padding:16px;background:var(--bg);color:var(--text);font-family:Inter,Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    main{width:100%;max-width:1200px;margin:auto}.summary{display:flex;align-items:flex-end;gap:20px;padding:18px 20px;background:var(--panel);border:1px solid var(--border);border-radius:14px}
    .label{margin:0 0 4px;color:var(--muted);font-size:14px}.price{margin:0;font-size:30px;font-weight:700}.change{padding-bottom:4px;font-size:16px;font-weight:600}.meta{margin-left:auto;padding-bottom:4px;color:var(--muted);text-align:right;font-size:12px}
    .controls{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}button{padding:7px 12px;border:1px solid var(--border);border-radius:8px;background:var(--panel);color:var(--text);cursor:pointer}button.active{color:#fff;background:#2383e2;border-color:#2383e2}
    #status{margin:10px 2px;color:var(--muted);font-size:12px}#chart{width:100%;height:570px;border:1px solid var(--border);border-radius:14px;overflow:hidden}#error{display:none;padding:24px;border:1px solid #fecaca;border-radius:12px;background:#fef2f2;color:#b91c1c;white-space:pre-wrap;line-height:1.6}
    @media(max-width:600px){body{padding:8px}.summary{align-items:flex-start;flex-direction:column;gap:8px}.meta{margin-left:0;text-align:left}#chart{height:480px}}
  </style>
</head>
<body>
  <main>
    <section class="summary">
      <div><p class="label">KOSPI</p><p id="price" class="price">불러오는 중...</p></div>
      <div id="change" class="change"></div>
      <div class="meta"><div id="trade-date"></div><div id="updated-at"></div></div>
    </section>
    <nav class="controls" aria-label="조회 기간">
      <button data-days="30">1개월</button><button data-days="90">3개월</button><button data-days="180">6개월</button><button data-days="365" class="active">1년</button><button data-days="1095">3년</button><button data-days="0">전체</button>
    </nav>
    <div id="status">데이터 주소를 확인하는 중입니다.</div>
    <div id="chart"></div><div id="error"></div>
  </main>
  <script>
    const OWNER="rkdtjdgk0409-dev";
    const REPOSITORY="kospi-candle-dashboard1";
    const DATA_URLS=[
      `./data/kospi.json?v=${Date.now()}`,
      `https://raw.githubusercontent.com/${OWNER}/${REPOSITORY}/main/docs/data/kospi.json?v=${Date.now()}`
    ];
    let allRows=[];

    const formatNumber=value=>Number(value).toLocaleString("ko-KR",{minimumFractionDigits:2,maximumFractionDigits:2});

    async function fetchWithFallback(){
      const errors=[];
      for(const url of DATA_URLS){
        try{
          document.querySelector("#status").textContent=`데이터 요청 중: ${url.split("?")[0]}`;
          const response=await fetch(url,{cache:"no-store"});
          if(!response.ok)throw new Error(`HTTP ${response.status}`);
          const payload=await response.json();
          if(!Array.isArray(payload.data)||payload.data.length===0)throw new Error("data 배열이 비어 있습니다.");
          document.querySelector("#status").textContent=`데이터 연결 성공 · ${url.startsWith(".")?"GitHub Pages":"GitHub 원본 백업"}`;
          return payload;
        }catch(error){errors.push(`${url.split("?")[0]} → ${error.message}`)}
      }
      throw new Error(`두 데이터 주소에서 모두 읽지 못했습니다.\n${errors.join("\n")}`);
    }

    function selectRows(days){
      if(!days)return allRows;
      const last=new Date(allRows[allRows.length-1].trade_date),first=new Date(last);
      first.setDate(first.getDate()-days);
      return allRows.filter(row=>new Date(row.trade_date)>=first);
    }

    function draw(days=365){
      if(typeof Plotly==="undefined")throw new Error("Plotly 차트 라이브러리를 불러오지 못했습니다.");
      const rows=selectRows(days);
      const trace={type:"candlestick",x:rows.map(r=>r.trade_date),open:rows.map(r=>r.open),high:rows.map(r=>r.high),low:rows.map(r=>r.low),close:rows.map(r=>r.close),increasing:{line:{color:"#e5484d"}},decreasing:{line:{color:"#3b82f6"}},name:"KOSPI",hoverlabel:{namelength:0}};
      const textColor=getComputedStyle(document.documentElement).getPropertyValue("--text");
      Plotly.react("chart",[trace],{margin:{l:58,r:20,t:28,b:48},paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",font:{color:textColor},xaxis:{rangeslider:{visible:false},gridcolor:"rgba(128,128,128,.15)"},yaxis:{tickformat:",.0f",gridcolor:"rgba(128,128,128,.15)"},showlegend:false,autosize:true},{responsive:true,displaylogo:false});
    }

    async function start(){
      try{
        const payload=await fetchWithFallback();
        allRows=payload.data;
        const latest=payload.latest||allRows[allRows.length-1];
        const rate=Number(latest.change_rate??0);
        document.querySelector("#price").textContent=formatNumber(latest.close);
        const change=document.querySelector("#change");
        change.textContent=`${rate>=0?"+":""}${rate.toFixed(2)}%`;
        change.style.color=rate>=0?"var(--up)":"var(--down)";
        document.querySelector("#trade-date").textContent=`기준일 ${latest.trade_date}`;
        document.querySelector("#updated-at").textContent=payload.updated_at?`갱신 ${new Date(payload.updated_at).toLocaleString("ko-KR")}`:"";
        draw(365);
      }catch(error){
        console.error(error);document.querySelector("#chart").style.display="none";
        const box=document.querySelector("#error");box.style.display="block";box.textContent=`차트를 표시하지 못했습니다.\n\n${error.message}\n\nGitHub 저장소에 docs/data/kospi.json이 존재하는지 확인하세요.`;
        document.querySelector("#status").textContent="데이터 연결 실패";
      }
    }

    document.querySelectorAll("button[data-days]").forEach(button=>button.addEventListener("click",()=>{
      document.querySelectorAll("button[data-days]").forEach(item=>item.classList.remove("active"));
      button.classList.add("active");
      try{draw(Number(button.dataset.days))}catch(error){alert(error.message)}
    }));
    start();
  </script>
</body>
</html>
